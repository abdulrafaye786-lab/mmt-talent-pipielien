<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mudassar - Talent Pipeline Group</title>
  
  <!-- Tailwind CSS Play CDN for instant utility styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          boxShadow: {
            'slab': '4px 4px 0px #0F172A',
            'slab-sm': '2px 2px 0px #0F172A'
          }
        }
      }
    }
  </script>

  <!-- Google Fonts & Custom Scrollbars -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;750&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #FAF9F5;
      font-family: 'Inter', sans-serif;
    }
    /* Simple dynamic fade-in animation */
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- React & Lucide Icons via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">

  <!-- React Mount Target -->
  <div id="root"></div>

  <script type="text/javascript">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- STATIC SEED DATA ---
    const SEED_CANDIDATES = [
      {
        id: "cand_1",
        fullName: "Sharjeel Farrukh",
        gender: "Male",
        email: "sharjeelfarrukh5523@gmail.com",
        contactNo: "+923357654162",
        role: "Professional",
        title: "Data Analyst",
        linkedinUrl: "https://www.linkedin.com/in/sharjeel-farrukh-b60367180/",
        summary: "Results-driven Data Analyst with 3+ years of experience in SQL, Python, ETL, and interactive charts.",
        referral: "Sir Mudassar Sb",
        pipelineStage: "hired",
        skills: ["Data Visualization", "ETL Processes", "SQL", "Python", "Reporting Automation"]
      },
      {
        id: "cand_2",
        fullName: "Hadia Haris",
        gender: "Female",
        email: "hadiaharis815@gmail.com",
        contactNo: "03174464485",
        role: "Student",
        title: "A-Levels Student",
        linkedinUrl: "",
        summary: "Passionate about and actively training in business intelligence, data analytical routines, and AI tools.",
        referral: "Sir Mudassar Sb",
        pipelineStage: "screening",
        skills: ["Mathematics", "Psychology", "Business Intelligence", "Data Analysis", "AI Learning"]
      },
      {
        id: "cand_3",
        fullName: "Ayaan Abbas",
        gender: "Male",
        email: "mannat32.abbas@gmail.com",
        contactNo: "0329-7748680",
        role: "Student",
        title: "AI Student & Coordinator",
        linkedinUrl: "",
        summary: "Helping keep the team directory organized while mastering daily machine learning models.",
        referral: "Sir Mudassar Sb",
        pipelineStage: "interview",
        skills: ["AI Technology", "Team Organization", "Community Contribution", "Collaboration"]
      }
    ];

    // --- UTILITY: PARSE GOOGLE SHEET CSV ---
    function parseCSV(text) {
      const lines = text.split('\n');
      const result = [];
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        
        // Handle comma-separated elements matching quote fields
        const row = [];
        let cur = '';
        let inQuotes = false;
        const line = lines[i];
        
        for (let j = 0; j < line.length; j++) {
          const char = line[j];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            row.push(cur.trim().replace(/^"|"$/g, ''));
            cur = '';
          } else {
            cur += char;
          }
        }
        row.push(cur.trim().replace(/^"|"$/g, ''));
        
        if (row.length >= 3) {
          result.push({
            id: `sheet_${i}`,
            timestamp: row[0] || '',
            email: row[1] || 'no-email@test.com',
            fullName: row[2] || 'Anonymous Candidate',
            gender: row[3] || 'Male',
            contactNo: row[4] || '',
            role: row[5] === 'Professional' ? 'Professional' : 'Student',
            title: row[6] || 'Technology Cohort Student',
            linkedinUrl: row[7] || '',
            summary: row[8] || 'Actively exploring digital growth vectors.',
            referral: row[9] || 'Direct',
            pipelineStage: 'applied',
            skills: (row[10] || 'Learning').split(',').map(s => s.trim())
          });
        }
      }
      return result;
    }

    // --- MAIN APP COMPONENT ---
    function App() {
      const defaultUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQllGe6Tcj7I8_zG9JV8ySEbTVfFbXp2cXG07fY2UbsG7HMIu4NdFGlJ7WWgx1zk31_ovcrJE9jHQHz/pub?output=csv';
      const [candidates, setCandidates] = useState(SEED_CANDIDATES);
      const [sheetUrl, setSheetUrl] = useState(defaultUrl);
      const [lastSynced, setLastSynced] = useState('');
      const [syncError, setSyncError] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      
      // Filtering & Settings States
      const [deduplicate, setDeduplicate] = useState(false);
      const [searchTerm, setSearchTerm] = useState('');
      const [activeRole, setActiveRole] = useState(null);
      const [activeGender, setActiveGender] = useState(null);
      const [activeStage, setActiveStage] = useState(null);
      const [selectedSkill, setSelectedSkill] = useState(null);
      const [selectedCandidate, setSelectedCandidate] = useState(null);

      // Welcome Greeting Text
      const greeting = useMemo(() => {
        const hrs = new Date().getHours();
        if (hrs < 12) return 'Good morning ☀️';
        if (hrs < 18) return 'Good afternoon 🌤️';
        return 'Good evening 🌙';
      }, []);

      // Fetch Live Google Sheets Data
      const handleSync = async () => {
        setIsLoading(true);
        setSyncError('');
        try {
          const res = await fetch(sheetUrl);
          if (!res.ok) throw new Error('Could not fetch active CSV data. Check URL publish settings.');
          const rawText = await res.text();
          const parsed = parseCSV(rawText);
          if (parsed.length > 0) {
            setCandidates(parsed);
            setLastSynced(new Date().toLocaleTimeString());
          } else {
            throw new Error('No valid records retrieved from the spreadsheet.');
          }
        } catch (err) {
          setSyncError(err.message);
        } finally {
          setIsLoading(false);
        }
      };

      // Run spreadsheet sync when app mounts
      useEffect(() => {
        handleSync();
      }, []);

      // Pre-process and filter candidates list
      const processedList = useMemo(() => {
        let list = [...candidates];
        
        // Anti-Duplicate Filter
        if (deduplicate) {
          const seen = new Set();
          list = list.filter(c => {
            const emailKey = c.email.toLowerCase().trim();
            if (seen.has(emailKey)) return false;
            seen.add(emailKey);
            return true;
          });
        }

        // Apply visual category tags
        return list.filter(c => {
          if (activeRole && c.role !== activeRole) return false;
          if (activeGender && c.gender !== activeGender) return false;
          if (activeStage && c.pipelineStage !== activeStage) return false;
          if (selectedSkill && !c.skills.includes(selectedSkill)) return false;
          if (searchTerm) {
            const query = searchTerm.toLowerCase();
            const hitName = c.fullName?.toLowerCase().includes(query);
            const hitTitle = c.title?.toLowerCase().includes(query);
            const hitSkills = c.skills?.some(s => s.toLowerCase().includes(query));
            if (!hitName && !hitTitle && !hitSkills) return false;
          }
          return true;
        });
      }, [candidates, deduplicate, activeRole, activeGender, activeStage, selectedSkill, searchTerm]);

      // Metrics Summary
      const metrics = useMemo(() => {
        const totals = processedList.length;
        const students = processedList.filter(c => c.role === 'Student').length;
        const professionals = processedList.filter(c => c.role === 'Professional').length;
        const male = processedList.filter(c => c.gender === 'Male').length;
        const female = processedList.filter(c => c.gender === 'Female').length;
        return { totals, students, professionals, male, female };
      }, [processedList]);

      // Highlight All Distinct Skills Listed
      const allSkills = useMemo(() => {
        const skillsObj = {};
        processedList.forEach(c => {
          c.skills?.forEach(s => {
            if (s) {
              skillsObj[s] = (skillsObj[s] || 0) + 1;
            }
          });
        });
        return Object.entries(skillsObj).sort((a,b) => b[1] - a[1]).slice(0, 12);
      }, [processedList]);

      // Handle custom stage update simulation helper
      const updatePipelineStage = (id, newStage) => {
        setCandidates(prev => prev.map(c => {
          if (c.id === id) {
            return { ...c, pipelineStage: newStage };
          }
          return c;
        }));
        if (selectedCandidate && selectedCandidate.id === id) {
          setSelectedCandidate(prev => ({ ...prev, pipelineStage: newStage }));
        }
      };

      return (
        <div className="flex flex-col min-h-screen">
          
          {/* Top Sticky Header */}
          <header className="bg-white border-b-2 border-slate-900 sticky top-0 z-30 px-4 sm:px-6 py-3 shadow-slab-sm">
            <div className="max-w-7xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white border-2 border-slate-900 shadow-slab-sm">
                  <span className="font-extrabold text-sm tracking-tighter">M²</span>
                </div>
                <div>
                  <div className="flex items-center gap-2">
                    <span className="font-extrabold tracking-wide text-sm sm:text-base text-slate-900 font-display">MMT-CONNECT</span>
                    <span className="bg-emerald-50 text-emerald-700 text-[10px] font-black uppercase px-2 py-0.5 rounded-md border border-emerald-200">Live</span>
                  </div>
                  <p className="text-[10px] text-slate-500 font-bold -mt-0.5">Mudassar - Talent Pipeline Group</p>
                </div>
              </div>

              <div className="flex items-center gap-3">
                <span className="text-xs font-mono font-bold bg-indigo-50 border-2 border-slate-900 py-1.5 px-3 rounded-full text-indigo-900">
                  {metrics.totals} Active Profiles
                </span>
              </div>
            </div>
          </header>

          {/* Main Dashboard Panel */}
          <main className="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8">
            
            {/* Elegant Welcome Hero Banner */}
            <div className="relative overflow-hidden bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-950 rounded-3xl p-6 sm:p-10 border-2 border-indigo-500/30 shadow-xl text-white">
              <div className="absolute top-0 right-0 w-80 h-80 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none -mr-20 -mt-20"></div>
              
              <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                  <div className="inline-flex items-center gap-2 px-3 py-1 bg-indigo-500/15 border border-indigo-400/20 rounded-full text-[11px] font-mono font-bold tracking-wider text-indigo-300 uppercase mb-4">
                    <span>✨ MMT-TALENT PIPELINE ACTIVE</span>
                  </div>
                  <h1 className="text-3xl sm:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-white to-indigo-200">
                    {greeting}, welcome!
                  </h1>
                  <p className="text-sm sm:text-base text-indigo-200/80 mt-3 max-w-2xl leading-relaxed">
                    This is the interactive talent panel for <strong className="text-white font-semibold underline decoration-indigo-400 decoration-2 underline-offset-4">Mudassar -Talent Pipeline Group</strong>. 
                    Explore student learners, track career readiness, study demographics, and synchronize records seamlessly.
                  </p>
                </div>

                {/* Left/Right controls */}
                <div className="bg-slate-950/50 backdrop-blur-md border border-indigo-500/20 p-5 rounded-2xl w-full md:w-80">
                  <div className="text-[11px] font-bold uppercase text-indigo-300 tracking-widest mb-3">Quick Filter Segments</div>
                  <div className="space-y-2">
                    
                    <button 
                      onClick={() => setActiveRole(activeRole === 'Student' ? null : 'Student')}
                      className={`w-full p-2.5 rounded-lg border text-left text-xs font-bold transition-all flex items-center justify-between ${
                        activeRole === 'Student' ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-900/60 border-slate-800 text-slate-350 hover:bg-slate-900'
                      }`}
                    >
                      <span>🎓 Student Learners</span>
                      <span className="font-mono">{metrics.students}</span>
                    </button>

                    <button 
                      onClick={() => setActiveRole(activeRole === 'Professional' ? null : 'Professional')}
                      className={`w-full p-2.5 rounded-lg border text-left text-xs font-bold transition-all flex items-center justify-between ${
                        activeRole === 'Professional' ? 'bg-purple-600 border-purple-400 text-white' : 'bg-slate-900/60 border-slate-800 text-slate-350 hover:bg-slate-900'
                      }`}
                    >
                      <span>💼 Professional</span>
                      <span className="font-mono">{metrics.professionals}</span>
                    </button>
                    
                  </div>
                  {(activeRole || activeGender || activeStage || selectedSkill) && (
                    <button 
                      onClick={() => { setActiveRole(null); setActiveGender(null); setActiveStage(null); setSelectedSkill(null); }}
                      className="mt-3 text-rose-300 hover:underline text-[11px] font-bold block text-center w-full"
                    >
                      Clear selected segment filters ×
                    </button>
                  )}
                </div>
              </div>
            </div>

            {/* Google Sheets Sync System Widget */}
            <div className="bg-white border-2 border-slate-900 p-6 rounded-2xl shadow-slab space-y-4">
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                  <h3 className="text-lg font-extrabold text-slate-900">⚡ Live Google Sheet Syncing</h3>
                  <p className="text-xs text-slate-500">Inputs are parsed in real-time from your published CSV format spreadsheet.</p>
                </div>
                <div className="text-right">
                  {lastSynced && (
                    <span className="text-xs font-mono font-bold text-indigo-700 bg-indigo-50 px-2 py-1 rounded-md border border-indigo-100">
                      Last synchronized: {lastSynced}
                    </span>
                  )}
                </div>
              </div>

              <div className="flex flex-col md:flex-row gap-3">
                <input 
                  type="text"
                  value={sheetUrl}
                  onChange={(e) => setSheetUrl(e.target.value)}
                  placeholder="Insert published Google Sheet CSV URL" 
                  className="flex-1 bg-slate-50 border-2 border-slate-200 rounded-xl px-4 py-3 text-xs font-mono focus:border-indigo-600 focus:outline-none"
                />
                <button
                  onClick={handleSync}
                  disabled={isLoading}
                  className="bg-indigo-600 hover:bg-indigo-750 text-white font-extrabold text-xs px-6 py-3 rounded-xl border-2 border-slate-900 shadow-slab-sm active:translate-y-0.5 transition-all flex items-center justify-center gap-2"
                >
                  {isLoading ? 'Fetching Datasets...' : 'Synchronize Live Data 🔄'}
                </button>
              </div>

              {syncError && (
                <div className="text-rose-600 bg-rose-50 border border-rose-200 p-3 rounded-lg text-xs font-mono">
                  ⚠️ Error Syncing Sheet: {syncError}
                </div>
              )}
            </div>

            {/* Core Statistics Multi-Counters Hub */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              <div className="bg-white p-5 border-2 border-slate-900 rounded-xl shadow-slab-sm flex flex-col justify-between">
                <span className="text-[10px] text-slate-400 uppercase font-black tracking-widest">Selected Cohort Size</span>
                <span className="text-3xl font-black mt-2 text-indigo-600 font-mono">{metrics.totals}</span>
              </div>
              <div className="bg-white p-5 border-2 border-slate-900 rounded-xl shadow-slab-sm flex flex-col justify-between">
                <span className="text-[10px] text-slate-400 uppercase font-black tracking-widest">Student Learners</span>
                <span className="text-3xl font-black mt-2 text-teal-600 font-mono">{metrics.students}</span>
              </div>
              <div className="bg-white p-5 border-2 border-slate-900 rounded-xl shadow-slab-sm flex flex-col justify-between">
                <span className="text-[10px] text-slate-400 uppercase font-black tracking-widest">Professionals</span>
                <span className="text-3xl font-black mt-2 text-purple-600 font-mono">{metrics.professionals}</span>
              </div>
              <div className="bg-white p-5 border-2 border-slate-900 rounded-xl shadow-slab-sm flex flex-col justify-between">
                <span className="text-[10px] text-slate-400 uppercase font-black tracking-widest">Female Match Rate</span>
                <span className="text-3xl font-black mt-2 text-rose-600 font-mono">
                  {metrics.totals > 0 ? Math.round((metrics.female / metrics.totals) * 100) : 0}%
                </span>
              </div>
            </div>

            {/* Main Interactive Candidate Filtering Desk */}
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
              
              {/* Left filter sidebars */}
              <div className="lg:col-span-4 bg-white border-2 border-slate-900 rounded-2xl p-6 shadow-slab space-y-6">
                <div>
                  <h4 className="text-sm font-extrabold text-slate-900 uppercase tracking-wide border-b pb-2">Filter Matrix Controls</h4>
                </div>

                {/* Sub-Filters */}
                <div className="space-y-4">
                  
                  {/* Search Query Input */}
                  <div>
                    <span className="text-[10px] uppercase font-bold text-slate-400 block mb-2">Search Input</span>
                    <input 
                      type="text"
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      placeholder="Type clean query name, skill..." 
                      className="w-full bg-slate-50 border-2 border-slate-200 rounded-lg p-2.5 text-xs focus:border-indigo-600 focus:outline-none"
                    />
                  </div>

                  {/* Gender toggles */}
                  <div>
                    <span className="text-[10px] uppercase font-bold text-slate-400 block mb-2">Gender Demographics</span>
                    <div className="flex gap-2">
                      {['Male', 'Female'].map(g => (
                        <button 
                          key={g}
                          onClick={() => setActiveGender(activeGender === g ? null : g)}
                          className={`flex-1 text-xs font-bold py-2 border-2 border-slate-900 rounded-lg shadow-slab-sm transition-all text-center ${
                            activeGender === g ? 'bg-indigo-600 text-white' : 'bg-slate-50 hover:bg-slate-100'
                          }`}
                        >
                          {g}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Stage filter */}
                  <div>
                    <span className="text-[10px] uppercase font-bold text-slate-400 block mb-2">Career Conversion Stage</span>
                    <div className="grid grid-cols-2 gap-2">
                      {['applied', 'screening', 'interview', 'offer', 'hired'].map(stg => (
                        <button
                          key={stg}
                          onClick={() => setActiveStage(activeStage === stg ? null : stg)}
                          className={`text-xs capitalize font-bold p-2 border border-slate-300 rounded-lg transition-all ${
                            activeStage === stg ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white hover:bg-slate-50'
                          }`}
                        >
                          {stg}
                        </button>
                      ))}
                    </div>
                  </div>

                </div>

                {/* Top Skill tags cloud indicator list */}
                <div>
                  <h5 className="text-[10px] uppercase font-bold text-slate-400 block mb-3">Top Verified Skills ({allSkills.length})</h5>
                  <div className="flex flex-wrap gap-1.5">
                    {allSkills.map(([sk, cnt]) => (
                      <button 
                        key={sk}
                        onClick={() => setSelectedSkill(selectedSkill === sk ? null : sk)}
                        className={`text-[9px] font-bold font-mono px-2 py-1 rounded-md border ${
                          selectedSkill === sk ? 'bg-indigo-605 text-white border-indigo-600' : 'bg-indigo-50 text-indigo-950 border-indigo-100 hover:border-indigo-200'
                        }`}
                      >
                        {sk} <span className="opacity-50">({cnt})</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Deduplicator Mode switch */}
                <div className="pt-4 border-t border-slate-100 flex items-center justify-between">
                  <span className="text-xs font-bold text-slate-700">Deduplicate email rows</span>
                  <button 
                    onClick={() => setDeduplicate(!deduplicate)}
                    className={`w-12 h-6 rounded-full p-0.5 border-2 border-slate-900 transition-colors ${
                      deduplicate ? 'bg-emerald-500' : 'bg-slate-200'
                    }`}
                  >
                    <div className={`w-4 h-4 rounded-full bg-white border border-slate-900 transition-transform transform ${
                      deduplicate ? 'translate-x-6' : 'translate-x-0'
                    }`} />
                  </button>
                </div>

              </div>

              {/* Main Candidate Card Profile Deck grid */}
              <div className="lg:col-span-8 space-y-4">
                <div className="flex justify-between items-center bg-white border-2 border-slate-900 p-4 rounded-xl">
                  <h3 className="text-sm font-extrabold text-slate-900">Spotlight Candidates ({processedList.length})</h3>
                  <p className="text-[11px] text-slate-500 font-bold">Showing filtered matches</p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {processedList.map(c => (
                    <div 
                      key={c.id}
                      onClick={() => setSelectedCandidate(c)}
                      className="bg-white border-2 border-slate-900 rounded-xl p-5 shadow-slab hover:hover:scale-[1.01] hover:shadow-indigo-100 transition-all cursor-pointer relative flex flex-col justify-between"
                    >
                      <div>
                        {/* Tags element */}
                        <div className="flex items-center justify-between mb-3 text-[10px] font-bold uppercase">
                          <span className={`px-2 py-0.5 rounded border ${
                            c.role === 'Professional' ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-indigo-50 text-indigo-700 border-indigo-200'
                          }`}>
                            {c.role === 'Professional' ? 'Professional' : 'Student Learner'}
                          </span>
                          <span className="text-slate-400 capitalize">Stage: <strong className="text-indigo-600">{c.pipelineStage}</strong></span>
                        </div>

                        <h4 className="text-base font-extrabold text-slate-900">{c.fullName}</h4>
                        <p className="text-xs text-indigo-700 font-bold tracking-tight mb-2">{c.title}</p>
                        
                        <p className="text-xs text-slate-500 line-clamp-3 leading-relaxed mb-4">
                          {c.summary}
                        </p>
                      </div>

                      <div className="flex flex-wrap gap-1 mt-3">
                        {c.skills?.slice(0, 3).map(sk => (
                          <span key={sk} className="text-[9px] font-semibold bg-slate-50 border px-1.5 py-0.5 rounded text-slate-650">
                            {sk}
                          </span>
                        ))}
                        {c.skills?.length > 3 && (
                          <span className="text-[9px] font-bold text-slate-400 px-1 py-0.5">
                            +{c.skills.length - 3} more
                          </span>
                        )}
                      </div>
                    </div>
                  ))}

                  {processedList.length === 0 && (
                    <div className="col-span-2 bg-indigo-50/50 p-12 rounded-xl text-center border-2 border-dashed border-indigo-200 text-indigo-900 font-bold">
                      🚫 No profiles match current filter configurations
                    </div>
                  )}
                </div>
              </div>

            </div>

          </main>

          {/* User Details Modal popup element */}
          {selectedCandidate && (
            <div className="fixed inset-0 bg-slate-950/45 backdrop-blur-xs flex items-center justify-center p-4 z-50 fade-in" onClick={() => setSelectedCandidate(null)}>
              <div className="bg-white rounded-3xl p-6 md:p-8 max-w-lg w-full border-2 border-slate-900 shadow-slab relative text-left" onClick={(e) => e.stopPropagation()}>
                
                <div className="flex justify-between items-start mb-4">
                  <div>
                    <span className="text-[10px] uppercase font-extrabold tracking-wider bg-indigo-50 px-2.5 py-1 rounded text-indigo-700">
                      {selectedCandidate.role === 'Professional' ? 'Professional' : 'Student Learner'}
                    </span>
                    <h3 className="text-2xl font-black text-slate-900 mt-2">{selectedCandidate.fullName}</h3>
                    <p className="text-xs font-bold text-indigo-600 uppercase tracking-widest">{selectedCandidate.title}</p>
                  </div>
                  <button onClick={() => setSelectedCandidate(null)} className="w-8 h-8 rounded-full border border-slate-250 flex items-center justify-center hover:bg-slate-55 text-slate-500">✕</button>
                </div>

                <div className="space-y-4">
                  
                  {/* Bio */}
                  <div className="bg-slate-50 p-4 rounded-xl border">
                    <span className="text-[10px] uppercase font-black text-slate-400 block mb-1">Career Ambition Quote</span>
                    <p className="text-xs text-slate-650 italic leading-relaxed">"{selectedCandidate.summary}"</p>
                  </div>

                  {/* Skills Grid List representation */}
                  <div>
                    <span className="text-[10px] uppercase font-black text-slate-400 block mb-2">Validated Competence Skills</span>
                    <div className="flex flex-wrap gap-1.5">
                      {selectedCandidate.skills?.map(sk => (
                        <span key={sk} className="text-[10px] font-bold px-2 py-1 bg-indigo-50 border border-indigo-100 text-indigo-900 rounded-md">
                          {sk}
                        </span>
                      ))}
                    </div>
                  </div>

                  {/* Pipelines State change */}
                  <div className="flex items-center gap-3 pt-3 border-t">
                    <span className="text-xs font-extrabold text-slate-550">Update Process Stage:</span>
                    <select 
                      value={selectedCandidate.pipelineStage}
                      onChange={(e) => updatePipelineStage(selectedCandidate.id, e.target.value)}
                      className="text-xs font-bold p-1.5 border-2 border-slate-900 rounded-lg focus:outline-none"
                    >
                      <option value="applied">Applied</option>
                      <option value="screening">Screening</option>
                      <option value="interview">Interview</option>
                      <option value="offer">Offer</option>
                      <option value="hired">Hired (Onboarded)</option>
                    </select>
                  </div>

                </div>

                <div className="mt-6 pt-4 border-t flex justify-end gap-2">
                  {selectedCandidate.linkedinUrl ? (
                    <a 
                      href={selectedCandidate.linkedinUrl} 
                      target="_blank" 
                      className="text-xs bg-[#0077B5] border-2 border-slate-950 text-white font-bold px-4 py-2 rounded-lg shadow-slab-sm"
                    >
                      Visit LinkedIn Network URL
                    </a>
                  ) : (
                    <span className="text-xs text-slate-400 font-bold italic">No LinkedIn profile provided</span>
                  )}
                </div>

              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-white border-t border-slate-200 mt-20 py-8 text-center text-xs font-mono text-slate-400">
            <div className="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div>
                <strong>MMT CONNECT PIPELINE SYSTEM</strong> — Mudassar - Talent Pipeline Group
              </div>
              <p>© 2026 Mudassar - Talent Pipeline Group. All rights reserved.</p>
            </div>
          </footer>

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
